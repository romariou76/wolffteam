<section class="p-3">
  <aside class="d-flex align-items-center mb-3">
    <span class="me-2 fs-2 fw-bold"> Ventas </span>
    <!-- <img src="Icons/excavador.png" alt="icono"> -->
  </aside>

  <div class="d-flex justify-content-between">
    <div class="d-flex gap-3"></div>

    <div class="ms-3 mb-3">
      <button
        type="button"
        mat-fab
        extended
        (click)="clickAdd()"
        class="bg-primary text-white"
        matTooltip="Agregar nueva maquina"
      >
        <mat-icon>add</mat-icon>
        Agregar
      </button>
    </div>
  </div>



  <div class="table-responsive">

    @if(isLoading()){
      <app-loader></app-loader>
    } @else {

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>Numero</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="cliente">
        <th mat-header-cell *matHeaderCellDef>Cliente</th>
        <td mat-cell *matCellDef="let element">{{ element.cliente }}</td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="fechaRegistro">
        <th mat-header-cell *matHeaderCellDef>Fecha Registro</th>
        <td mat-cell *matCellDef="let element">
          {{ element.fechaRegistro | date : "dd/MM/yyyy" }}
        </td>
        <td mat-footer-cell *matFooterCellDef class="fw-bold"></td>
      </ng-container>

      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef class="text-end">Total</th>
        <td mat-cell *matCellDef="let element" class="text-end">
          {{ element.total | currency : "S/ " : "symbol" : "1.2-2" }}
        </td>
        <td mat-footer-cell *matFooterCellDef class="text-end fw-bold">
        </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let element">{{ element.estado }}</td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="registradopor">
        <th mat-header-cell *matHeaderCellDef>Creado Por</th>
        <td mat-cell *matCellDef="let element">{{ element.registradoPor }}</td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="opt">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button mat-mini-fab matTooltip="Editar" (click)="clickViewDetalles(element)" class="me-1"
            style="color: white; background-color: #3f51b5"
            >
            <mat-icon>visibility</mat-icon>
          </button>


          <!-- <button
            mat-mini-fab
            matTooltip="Pagos Realizados"
            (click)="clickViewPagos(element)"
            style="color: white; background-color: #797979"
            class="me-1"
          >
            <mat-icon>receipt</mat-icon>
          </button> -->
        </td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      <tr mat-footer-row *matFooterRowDef="displayedColumns"></tr>
    </table>

    <mat-paginator
      [pageSizeOptions]="[10, 25, 35, 50]"
      showFirstLastButtons
    >
    </mat-paginator>

    }
  </div>
</section>
