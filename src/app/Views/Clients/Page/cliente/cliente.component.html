<section class="p-3">
  <aside class="d-flex align-items-center mb-3">
    <span class="me-2 fs-2 fw-bold"> Clientes </span>
    <!-- <img src="Icons/excavador.png" alt="icono"> -->
  </aside>

  <div class="d-flex justify-content-between table-responsive">
    <div class="d-flex gap-3"></div>

    <div class="ms-3 mb-3">
      <button
        type="button"
        mat-fab
        extended
        (click)="clickAdd()"
        class="bg-primary text-white"
        matTooltip="Registrar nuevo cliente"
      >
        <mat-icon>add</mat-icon>
        Agregar
      </button>
    </div>
  </div>

  <div class="table-responsive">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="nombres">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="apellidos">
        <th mat-header-cell *matHeaderCellDef>Apellidos</th>
        <td mat-cell *matCellDef="let element">{{ element.apellidos }}</td>
      </ng-container>

      <ng-container matColumnDef="numeroDocumento">
        <th mat-header-cell *matHeaderCellDef>Numero Documento</th>
        <td mat-cell *matCellDef="let element">
          {{ element.numeroDocumento }}
        </td>
      </ng-container>

      <ng-container matColumnDef="tipoDocumento">
        <th mat-header-cell *matHeaderCellDef>Tipo Documento</th>
        <td mat-cell *matCellDef="let element">{{ element.tipoDocumento }}</td>
      </ng-container>

      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Telefono</th>
        <td mat-cell *matCellDef="let element">{{ element.telefono }}</td>
      </ng-container>

      <ng-container matColumnDef="correo">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let element">{{ element.correo }}</td>
      </ng-container>

      <!-- <ng-container matColumnDef="activo">
        <th mat-header-cell *matHeaderCellDef>Activo</th>
        <td mat-cell *matCellDef="let element">
          <mat-icon [style.color]="element.activo ? 'green' : 'red'">
            {{ element.activo ? "check" : "close" }}
          </mat-icon>
        </td>
      </ng-container> -->

      <ng-container matColumnDef="fechaRegistro">
        <th mat-header-cell *matHeaderCellDef>Fecha Registro</th>
        <td mat-cell *matCellDef="let element">
          {{ element.fechaRegistro | date : "dd/MM/yyyy" }}
        </td>
      </ng-container>

      <ng-container matColumnDef="Acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button
            mat-mini-fab
            matTooltip="Editar"
            (click)="clickEdit(element)"
            class="me-1"
            style="color: white; background-color: #67c002"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <!-- <button mat-mini-fab matTooltip="Eliminar" (click)="clicDelete(element.id)" style="color: white; background-color: #dc3545">
          <mat-icon>delete</mat-icon>
        </button> -->
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [pageSizeOptions]="[10, 30, 50]"
      showFirstLastButtons
    ></mat-paginator>
  </div>
</section>
