<section class="p-3">
  <aside class="d-flex align-items-center mb-3">
    <span class="me-2 fs-2 fw-bold"> Cargo </span>
    <!-- <img src="Icons/excavador.png" alt="icono"> -->
  </aside>

  <div class="d-flex justify-content-between table-responsive">

    <div class="d-flex gap-3">
    </div>

    <div class="ms-3 mb-3">

      <button type="button" mat-fab extended (click)="clickAdd()" class="bg-primary text-white" matTooltip="Agregar nueva maquina">
        <mat-icon>add</mat-icon>
        Agregar
      </button>
    </div>
  </div>


<div class="table-responsive">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>Descripcion</th>
      <td mat-cell *matCellDef="let element">{{ element.descripcion }}</td>
    </ng-container>

        <ng-container matColumnDef="codigo">
      <th mat-header-cell *matHeaderCellDef>Codigo</th>
      <td mat-cell *matCellDef="let element">{{ element.codigo }}</td>
    </ng-container>

    <ng-container matColumnDef="opt">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <button
          mat-mini-fab
          matTooltip="Editar"
          (click)="clickEdit(element)"
          class="me-1"
          style="color: white; background-color: #67c002"
        >
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-mini-fab matTooltip="Eliminar" (click)="clicDelete(element.id)" style="color: white; background-color: #dc3545">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>


    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[10, 20, 40]" showFirstLastButtons></mat-paginator>

</div>



</section>
