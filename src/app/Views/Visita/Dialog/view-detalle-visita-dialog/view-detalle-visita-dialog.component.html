<div class="d-flex"><h1 mat-dialog-title class="sub-header-title">Detalles Visita N° {{visita.id}}</h1>

</div>
<div mat-dialog-content>
  <div class="row">


    <div class="col-6">
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Cliente</mat-label>
        <input matInput [value]="visita.cliente" [readonly]="true" />
      </mat-form-field>
    </div>

    <div class="col-6">
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Codigo Inscripcion</mat-label>
        <input matInput  [value]="visita.inscripcion ||''" [readonly]="true" />
      </mat-form-field>
    </div>


      <div class="col-6">
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Tipo Visita</mat-label>
        <input matInput  [value]="visita.tipo" [readonly]="true" />
      </mat-form-field>
    </div>


     <div class="col-6">
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Fecha </mat-label>
        <input matInput  [value]="visita.fecha | date: 'dd/MM/yyyy'" [readonly]="true" />
      </mat-form-field>
    </div>



    <div class="col-6">
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Registrado Por</mat-label>
        <input matInput [value]="visita.registradoPor" [readonly]="true" />
      </mat-form-field>
    </div>

      <div class="col-6">
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Observaciones</mat-label>
         <textarea
            matInput
            rows="3"
            [value]="visita.observaciones" [readonly]="true"
          ></textarea>
      </mat-form-field>
    </div>





  <div class="table-responsive">


  </div>

</div>

<mat-dialog-actions class="position-relative">
  <div class="position-absolute top-50 end-0 translate-middle-y me-3">
    <button
      mat-flat-button
      mat-dialog-close
      style="background-color: #f1d611; color: #c12d37"
    >
      Cerrar
    </button>

  </div>
</mat-dialog-actions>
