<section class="p-3">
  <aside class="d-flex align-items-center mb-3">
    <span class="me-2 fs-2 fw-bold"> Productos </span>
    <!-- <img src="Icons/excavador.png" alt="icono"> -->
  </aside>

  <div class="d-flex justify-content-between">
    <div class="d-flex gap-3"></div>

    <div class="ms-3 mb-3">
      <button
        type="button"
        mat-fab
        extended
        (click)="clickAdd()"
        class="bg-primary text-white"
        matTooltip="Agregar nueva maquina"
      >
        <mat-icon>add</mat-icon>
        Agregar
      </button>
    </div>
  </div>

  <div class="table-responsive">
    @if(isLoading()){
    <app-loader></app-loader>
    } @else {

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef class="text-end">Precio</th>
        <td mat-cell *matCellDef="let element" class="text-end">
          {{ element.precio | currency : "S/ " : "symbol" : "1.2-2" }}
        </td>
        <td mat-footer-cell *matFooterCellDef class="text-end fw-bold"></td>
      </ng-container>

      <ng-container matColumnDef="activo">
        <th mat-header-cell *matHeaderCellDef>Activo</th>
        <td mat-cell *matCellDef="let element">
          <mat-icon [style.color]="element.activo ? 'green' : 'red'">
            {{ element.activo ? "check" : "close" }}
          </mat-icon>
        </td>
        <td mat-footer-cell *matFooterCellDef class="text-end fw-bold"></td>
      </ng-container>

      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef>Fecha Registro</th>
        <td mat-cell *matCellDef="let element">
          {{ element.fechaRegistro | date : "dd/MM/yyyy" }}
        </td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button
            mat-mini-fab
            matTooltip="Editar"
            (click)="clickEdit(element)"
            class="me-1"
            style="color: white; background-color: #3d0eac"
          >
            <mat-icon>edit</mat-icon>
          </button>
          @if(element.activo) {
          <button
            mat-mini-fab
            matTooltip="Anular"
            (click)="clicDesactivar(element, false)"
            class="me-1"
            style="color: white; background-color: #dc3545"
          >
            <mat-icon>block</mat-icon>
          </button>
          } @else {

          <button
            mat-mini-fab
            matTooltip="Anular"
            (click)="clicDesactivar(element,true)"
            class="me-1"
            style="color: white; background-color: #67c002"
          >
            <mat-icon>task_alt</mat-icon>
          </button>

          }
        </td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      <tr mat-footer-row *matFooterRowDef="displayedColumns"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 35, 50]" showFirstLastButtons>
    </mat-paginator>

    }
  </div>
</section>
